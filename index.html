<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posture Master Pro - AI ตรวจจับท่านั่ง</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Kanit', 'sans-serif'] }
                }
            }
        }
    </script>

    <!-- TensorFlow & Teachable Machine Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { background-color: #f8fafc; }
        #webcam-container canvas {
            width: 100%;
            max-width: 400px;
            border-radius: 0.75rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            margin: 0 auto;
        }
        .mirror { transform: scaleX(-1); }
        .pulse-red { animation: pulse-red 2s infinite; }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col">

    <header class="bg-white shadow-sm py-4 mb-4">
        <div class="max-w-5xl mx-auto px-4 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-indigo-600 text-white p-2 rounded-lg">
                    <i class="fa-solid fa-display text-xl"></i>
                </div>
                <h1 class="text-xl font-semibold text-slate-800">Posture Master AI</h1>
            </div>
            <div id="device-indicator" class="text-xs bg-slate-100 px-3 py-1 rounded-full text-slate-500 font-medium">
                ตรวจพบ: กำลังประมวลผลอุปกรณ์...
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 w-full flex-grow flex flex-col md:flex-row gap-6 pb-10">
        
        <!-- Left Column: Controls -->
        <div class="w-full md:w-1/2 flex flex-col gap-4">
            
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                <h2 class="text-lg font-medium mb-4 flex items-center gap-2 text-indigo-600">
                    <i class="fa-solid fa-sliders"></i> ตั้งค่าและควบคุม
                </h2>

                <div class="grid grid-cols-2 gap-2 mb-4">
                    <button onclick="changeMode('desktop')" id="mode-desktop" class="mode-btn p-3 rounded-xl border-2 border-indigo-600 bg-indigo-50 text-indigo-700 flex flex-col items-center gap-1 transition-all">
                        <i class="fa-solid fa-desktop text-xl"></i>
                        <span class="text-xs font-bold">โหมดหน้าตรง (PC)</span>
                    </button>
                    <button onclick="changeMode('mobile')" id="mode-mobile" class="mode-btn p-3 rounded-xl border-2 border-transparent bg-slate-50 text-slate-500 flex flex-col items-center gap-1 transition-all">
                        <i class="fa-solid fa-mobile-screen text-xl"></i>
                        <span class="text-xs font-bold">โหมดมุมข้าง (Mobile)</span>
                    </button>
                </div>

                <div class="space-y-3 mb-4">
                    <div>
                        <label class="block text-xs text-slate-500 mb-1 font-medium">เลือกเสียงพูดแจ้งเตือน (ไทย)</label>
                        <select id="voice-selector" class="w-full px-3 py-2 border border-slate-200 rounded-lg outline-none text-sm"></select>
                    </div>
                    <div id="class-selector-container" class="hidden">
                        <label class="block text-xs text-slate-500 mb-1 font-medium">เลือกคลาส "หลังค่อม" จากโมเดล</label>
                        <select id="bad-posture-class" class="w-full px-3 py-2 border border-slate-200 rounded-lg outline-none text-sm font-bold text-rose-600"></select>
                    </div>
                </div>

                <div class="flex flex-col gap-2">
                    <button id="start-btn" onclick="requestPermissionAndStart()" disabled class="w-full bg-emerald-500 hover:bg-emerald-600 disabled:bg-slate-300 text-white font-bold py-3 rounded-xl transition-all flex justify-center items-center gap-2">
                        <i class="fa-solid fa-camera"></i> เริ่มระบบ / เปิดกล้อง
                    </button>
                    <div class="flex gap-2">
                        <button id="flip-btn" onclick="flipCamera()" class="hidden flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 py-3 rounded-xl transition-all flex justify-center items-center">
                            <i class="fa-solid fa-camera-rotate text-lg mr-2"></i> สลับกล้อง
                        </button>
                        <button id="stop-btn" onclick="stopCamera()" disabled class="flex-1 bg-rose-100 hover:bg-rose-200 text-rose-600 py-3 rounded-xl transition-all flex justify-center items-center">
                            <i class="fa-solid fa-power-off mr-2"></i> หยุด
                        </button>
                    </div>
                </div>
            </div>

            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex items-center justify-between">
                <span class="text-sm font-medium">เช็คระบบเสียง:</span>
                <button onclick="playBeep(); speakAlert('นั่งตรงๆไอ่สัด');" class="bg-indigo-100 text-indigo-600 px-4 py-1.5 rounded-lg text-sm font-bold hover:bg-indigo-200 transition-all">
                    ทดสอบเสียง
                </button>
            </div>
        </div>

        <!-- Right Column: Result Display -->
        <div class="w-full md:w-1/2 flex flex-col gap-4">
            <div id="status-card" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 text-center transition-all duration-500">
                <div id="status-icon" class="text-5xl mb-3 text-slate-300"><i class="fa-solid fa-clock-rotate-left"></i></div>
                <h3 id="status-text" class="text-2xl font-bold text-slate-400">รอเปิดกล้อง</h3>
                <p id="status-subtext" class="text-sm text-slate-400">กรุณากดปุ่มเริ่มระบบ</p>
            </div>

            <div id="webcam-container" class="relative bg-slate-200 rounded-2xl overflow-hidden aspect-square flex items-center justify-center border-4 border-white shadow-inner">
                <div id="webcam-placeholder" class="text-slate-400 flex flex-col items-center p-6 text-center">
                    <i class="fa-solid fa-video-slash text-5xl mb-3"></i>
                    <p id="placeholder-text" class="text-sm font-medium uppercase tracking-widest mb-2">Camera Standby</p>
                    <p class="text-[10px] text-slate-500 leading-relaxed">
                        หากกล้องไม่ทำงาน: <br>
                        1. ปิดแท็บอื่นหรือแอปอื่นที่ใช้กล้องอยู่ <br>
                        2. ลองคลิกปุ่ม "Pop-out" เพื่อเปิดหน้าใหม่ <br>
                        3. ตรวจสอบการอนุญาตสิทธิ์ที่แม่กุญแจ (URL Bar)
                    </p>
                </div>
            </div>

            <div id="label-container" class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 space-y-2 hidden"></div>
        </div>
    </main>

    <script>
        const MODELS = {
            desktop: "https://teachablemachine.withgoogle.com/models/KKEGvB-Zc/",
            mobile: "https://teachablemachine.withgoogle.com/models/son8WQqmL/"
        };

        let currentMode = 'desktop';
        let currentFacingMode = 'user'; 
        let model, webcam, ctx, maxPredictions;
        let isRunning = false;
        let modelType = "image";
        let lastBeepTime = 0;
        const BEEP_INTERVAL = 4000;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let availableVoices = [];

        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        if (isMobile) {
            document.getElementById('device-indicator').innerText = "ตรวจพบ: กำลังใช้โทรศัพท์";
            document.getElementById('flip-btn').classList.remove('hidden');
        } else {
            document.getElementById('device-indicator').innerText = "ตรวจพบ: กำลังใช้พีซี";
        }

        function populateVoiceList() {
            if (typeof speechSynthesis === 'undefined') return;
            availableVoices = speechSynthesis.getVoices();
            const voiceSelect = document.getElementById('voice-selector');
            if (availableVoices.length === 0) return;
            voiceSelect.innerHTML = '';
            const sorted = [...availableVoices.filter(v => v.lang.includes('th')), ...availableVoices.filter(v => !v.lang.includes('th'))];
            sorted.forEach(voice => {
                const opt = document.createElement('option');
                opt.textContent = `${voice.name} (${voice.lang})`;
                opt.value = voice.name;
                voiceSelect.appendChild(opt);
            });
        }
        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = populateVoiceList;
            populateVoiceList();
        }

        function speakAlert(text) {
            if ('speechSynthesis' in window) {
                if (window.speechSynthesis.speaking) window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(text);
                const selectedName = document.getElementById('voice-selector').value;
                const voice = availableVoices.find(v => v.name === selectedName);
                if (voice) { msg.voice = voice; msg.lang = voice.lang; }
                msg.volume = 1; msg.rate = 1.0;
                window.speechSynthesis.speak(msg);
            }
        }

        function playBeep() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            const t = audioCtx.currentTime;
            osc.frequency.setValueAtTime(600, t);
            osc.frequency.linearRampToValueAtTime(1200, t + 0.4);
            osc.frequency.linearRampToValueAtTime(600, t + 0.8);
            gain.gain.setValueAtTime(0, t);
            gain.gain.linearRampToValueAtTime(0.3, t + 0.1);
            gain.gain.linearRampToValueAtTime(0, t + 0.8);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(t); osc.stop(t + 0.8);
        }

        function changeMode(mode) {
            if (isRunning) { alert("กรุณาหยุดกล้องก่อนสลับโหมด"); return; }
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.remove('border-indigo-600', 'bg-indigo-50', 'text-indigo-700');
                btn.classList.add('border-transparent', 'bg-slate-50', 'text-slate-500');
            });
            const activeBtn = document.getElementById(`mode-${mode}`);
            activeBtn.classList.remove('border-transparent', 'bg-slate-50', 'text-slate-500');
            activeBtn.classList.add('border-indigo-600', 'bg-indigo-50', 'text-indigo-700');
            loadModel(); 
        }

        async function loadModel() {
            const url = MODELS[currentMode];
            const btn = document.getElementById('start-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> โหลดโมเดล...';
            try {
                const response = await fetch(url + "metadata.json");
                const metadata = await response.json();
                if (metadata.packageName === "@teachablemachine/pose") {
                    modelType = "pose";
                    model = await tmPose.load(url + "model.json", url + "metadata.json");
                } else {
                    modelType = "image";
                    model = await tmImage.load(url + "model.json", url + "metadata.json");
                }
                maxPredictions = model.getTotalClasses();
                const classSelector = document.getElementById("bad-posture-class");
                classSelector.innerHTML = '';
                model.getClassLabels().forEach(label => {
                    const opt = document.createElement("option");
                    opt.value = label; opt.text = label;
                    if (label.toLowerCase().includes("bad") || label.includes("ค่อม")) opt.selected = true;
                    classSelector.appendChild(opt);
                });
                document.getElementById("class-selector-container").classList.remove("hidden");
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-camera mr-2"></i> เริ่มระบบ / เปิดกล้อง';
            } catch (e) {
                console.error(e);
                btn.innerHTML = 'โหลดล้มเหลว';
            }
        }

        async function requestPermissionAndStart() {
            const btn = document.getElementById('start-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-2"></i> กำลังตรวจสอบกล้อง...';
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                stream.getTracks().forEach(track => {
                    track.stop();
                });

                await new Promise(resolve => setTimeout(resolve, 800));
                startCamera();
            } catch (err) {
                console.error("Permission/Source Error:", err);
                alert("ไม่สามารถเข้าถึงกล้องได้: โปรดตรวจสอบว่ามีแอปอื่นใช้กล้องอยู่หรือไม่ หรือกดยอมรับสิทธิ์ใช้งานกล้อง\n\n(Error: " + err.name + ")");
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-camera mr-2"></i> ลองอีกครั้ง';
            }
        }

        async function startCamera() {
            const container = document.getElementById("webcam-container");
            const placeholder = document.getElementById("webcam-placeholder");
            
            try {
                if (modelType === "pose") {
                    webcam = new tmPose.Webcam(400, 400, currentFacingMode === 'user');
                } else {
                    webcam = new tmImage.Webcam(400, 400, currentFacingMode === 'user');
                }

                await webcam.setup({ facingMode: currentFacingMode });
                await webcam.play();
                
                isRunning = true;
                document.getElementById('start-btn').classList.add('hidden');
                document.getElementById('stop-btn').disabled = false;
                
                placeholder.style.display = 'none';
                container.innerHTML = '';
                container.appendChild(webcam.canvas);
                
                if (currentFacingMode === 'user') webcam.canvas.classList.add('mirror');
                else webcam.canvas.classList.remove('mirror');

                if (modelType === "pose") ctx = webcam.canvas.getContext('2d');

                const labelCont = document.getElementById('label-container');
                labelCont.classList.remove('hidden');
                labelCont.innerHTML = '';
                for (let i = 0; i < maxPredictions; i++) {
                    labelCont.innerHTML += `
                        <div class="flex items-center gap-2 text-xs">
                            <span class="w-20 truncate font-bold text-slate-500">${model.getClassLabels()[i]}</span>
                            <div class="flex-grow bg-slate-100 rounded-full h-1.5"><div id="bar-${i}" class="bg-indigo-500 h-1.5 rounded-full w-0 transition-all"></div></div>
                            <span id="txt-${i}" class="w-8 text-right font-medium text-slate-400">0%</span>
                        </div>`;
                }

                updateStatusUI('normal', 'ระบบพร้อมทำงาน', 'สแกนท่านั่งเรียบร้อยแล้ว');
                window.requestAnimationFrame(loop);
            } catch (err) {
                console.error("Teachable Machine Setup Error:", err);
                alert("เกิดข้อผิดพลาด: ไลบรารีไม่สามารถเชื่อมต่อกล้องได้ โปรดลองรีเฟรชหน้าเว็บ");
                stopCamera();
            }
        }

        async function loop() {
            if (!isRunning) return;
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            if (!model || !webcam || !webcam.canvas) return;
            let prediction;
            if (modelType === "pose") {
                const { pose, posenetOutput } = await model.estimatePose(webcam.canvas);
                prediction = await model.predict(posenetOutput);
                if (pose && ctx) {
                    const min = 0.5;
                    tmPose.drawKeypoints(pose.keypoints, min, ctx);
                    tmPose.drawSkeleton(pose.keypoints, min, ctx);
                }
            } else {
                prediction = await model.predict(webcam.canvas);
            }

            const badClass = document.getElementById("bad-posture-class").value;
            let isBad = false;
            for (let i = 0; i < maxPredictions; i++) {
                const prob = prediction[i].probability;
                const p = Math.round(prob * 100);
                const bar = document.getElementById(`bar-${i}`);
                const txt = document.getElementById(`txt-${i}`);
                if (bar) bar.style.width = p + "%";
                if (txt) txt.innerText = p + "%";
                if (prediction[i].className === badClass && prob > 0.85) isBad = true;
            }
            handleAlert(isBad);
        }

        function handleAlert(isBad) {
            const card = document.getElementById("status-card");
            const sIcon = document.getElementById("status-icon");
            const sTitle = document.getElementById("status-text");
            const sSub = document.getElementById("status-subtext");
            if (!card || !sIcon || !sTitle || !sSub) return;
            if (isBad) {
                card.className = "bg-rose-50 p-6 rounded-2xl shadow-sm border border-rose-200 text-center pulse-red";
                sIcon.className = "text-5xl mb-3 text-rose-500";
                sIcon.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i>';
                sTitle.className = "text-2xl font-bold text-rose-600";
                sTitle.innerText = "นั่งหลังค่อม!";
                sSub.innerText = "คำแนะนำ: ยืดตัวตรงทันที";
                const now = Date.now();
                if (now - lastBeepTime > BEEP_INTERVAL) {
                    playBeep(); speakAlert("นั่งหลังค่อม"); lastBeepTime = now;
                }
            } else {
                card.className = "bg-emerald-50 p-6 rounded-2xl shadow-sm border border-emerald-200 text-center";
                sIcon.className = "text-5xl mb-3 text-emerald-500";
                sIcon.innerHTML = '<i class="fa-solid fa-circle-check"></i>';
                sTitle.className = "text-2xl font-bold text-emerald-600";
                sTitle.innerText = "ท่านั่งปกติ";
                sSub.innerText = "รักษาบุคลิกภาพที่ดีต่อไป";
            }
        }

        function flipCamera() {
            currentFacingMode = (currentFacingMode === 'user') ? 'environment' : 'user';
            if (isRunning) { stopCamera(); setTimeout(requestPermissionAndStart, 500); }
        }

        function stopCamera() {
            isRunning = false;
            if (webcam) { try { webcam.stop(); } catch(e) {} }
            const btn = document.getElementById('start-btn');
            btn.classList.remove('hidden');
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-camera mr-2"></i> เริ่มระบบ / เปิดกล้อง';
            document.getElementById('stop-btn').disabled = true;
            document.getElementById('webcam-container').innerHTML = `
                <div id="webcam-placeholder" class="text-slate-400 flex flex-col items-center p-6 text-center">
                    <i class="fa-solid fa-video-slash text-5xl mb-3"></i>
                    <p id="placeholder-text" class="text-sm font-medium uppercase tracking-widest mb-2">Camera Standby</p>
                </div>`;
            document.getElementById('label-container').classList.add('hidden');
            updateStatusUI('idle', 'หยุดทำงาน', 'ระบบพร้อมเริ่มต้นใหม่');
        }

        function updateStatusUI(type, title, sub) {
            const card = document.getElementById("status-card");
            const sTitle = document.getElementById("status-text");
            const sSub = document.getElementById("status-subtext");
            const sIcon = document.getElementById("status-icon");
            if (sTitle) sTitle.innerText = title;
            if (sSub) sSub.innerText = sub;
            if (type === 'idle' && card) {
                card.className = "bg-white p-6 rounded-2xl shadow-sm border border-slate-100 text-center";
                if (sIcon) {
                    sIcon.className = "text-5xl mb-3 text-slate-300";
                    sIcon.innerHTML = '<i class="fa-solid fa-clock-rotate-left"></i>';
                }
                if (sTitle) sTitle.className = "text-2xl font-bold text-slate-400";
            }
        }

        window.addEventListener('DOMContentLoaded', loadModel);
    </script>
</body>
</html>
